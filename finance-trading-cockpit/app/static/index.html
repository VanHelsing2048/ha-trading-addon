<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Cockpit</title>
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Trading Cockpit</h1>
          <p>Watchlist configurabile, andamento prezzi e news giornaliere.</p>
        </div>
        <form id="ticker-form" class="add-form">
          <div class="symbol-field">
            <input id="symbol" name="symbol" placeholder="Ticker" autocomplete="off" list="symbol-options" required />
            <datalist id="symbol-options"></datalist>
            <div id="symbol-suggestions" class="suggestions" hidden></div>
          </div>
          <input id="name" name="name" placeholder="Nome" autocomplete="off" />
          <input id="sector" name="sector" placeholder="Settore" autocomplete="off" />
          <button type="submit">Aggiungi</button>
        </form>
      </section>

      <section class="toolbar">
        <input id="watchlist-filter" placeholder="Filtra watchlist..." />
        <div id="range-tabs" class="range-tabs" aria-label="Intervallo grafico">
          <button type="button" data-range="1D">Oggi</button>
          <button type="button" data-range="1W">1S</button>
          <button class="active" type="button" data-range="1M">1M</button>
          <button type="button" data-range="1Y">1A</button>
          <button type="button" data-range="ALL">Totale</button>
        </div>
        <input id="news-query" placeholder="Cerca notizie giornaliere..." />
        <button id="search-news" type="button">Cerca</button>
        <button id="refresh" type="button">Aggiorna</button>
      </section>

      <section id="summary" class="summary-grid"></section>
      <section id="signals" class="grid"></section>

      <section class="news-panel">
        <h2>Notizie</h2>
        <div id="news"></div>
      </section>
    </main>
    <script src="static/app.js"></script>
  </body>
</html>
