name: Finance Trading Cockpit
version: "0.5.2"
slug: finance_trading_cockpit
description: Watchlist, news search and trading signals dashboard for Home Assistant.
url: https://github.com/VanHelsing2048/ha-trading-addon
image: ghcr.io/vanhelsing2048/{arch}-finance-trading-cockpit
arch:
  - aarch64
  - armv7
startup: services
boot: auto
init: false
host_network: false
