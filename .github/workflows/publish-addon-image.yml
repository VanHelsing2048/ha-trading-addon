name: Publish add-on image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build and sign ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep '^version:' finance-trading-cockpit/config.yaml | sed -E 's/version:[[:space:]]*"([^"]+)"/\1/')"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve image owner
        id: owner
        shell: bash
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: finance-trading-cockpit
          file: finance-trading-cockpit/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-finance-trading-cockpit:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-finance-trading-cockpit:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Finance Trading Cockpit Home Assistant add-on
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          IMAGE: ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-finance-trading-cockpit
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
